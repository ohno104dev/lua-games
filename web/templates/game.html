<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{TITLE}}</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #05070f;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      canvas {
        display: block;
        width: min(100vw, {{WIDTH}}px);
        height: auto;
        max-height: 100vh;
        aspect-ratio: {{WIDTH}} / {{HEIGHT}};
        image-rendering: auto;
      }
    </style>
  </head>
  <body>
    <script src="./player.js?g=./{{LOVE_FILE}}&v={{LOVE_VERSION}}&n=1"></script>
  </body>
</html>
